version: "3.9"

services:
  db:
    image: postgres:16
    container_name: enterprise_shell_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: enterprise_shell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - enterprise_shell_pgdata:/var/lib/postgresql/data

volumes:
  enterprise_shell_pgdata: