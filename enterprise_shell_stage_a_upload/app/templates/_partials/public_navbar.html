<header class="public-navbar">
    <div class="container navbar-inner">
        <a class="brand" href="{{ url_for('public.home') }}">
            <img
                src="{{ url_for('static', filename=branding.logo_path) }}"
                alt="{{ branding.app_name }} logo"
                class="brand-logo"
            >
            <div class="brand-copy">
                <span class="brand-title">{{ branding.app_name }}</span>
                <span class="brand-tagline">{{ branding.app_tagline }}</span>
            </div>
        </a>

        <nav class="nav-links">
            <a href="{{ url_for('public.home') }}">Home</a>
            <a href="{{ url_for('public.about') }}">About</a>
            <a href="{{ url_for('public.status') }}">Status</a>
        </nav>
    </div>
</header>
