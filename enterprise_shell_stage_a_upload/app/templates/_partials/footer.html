<footer class="site-footer">
    <div class="container footer-inner">
        <div>
            <strong>{{ branding.app_name }}</strong>
            <div class="footer-text">{{ branding.footer_text }}</div>
        </div>
        <div class="footer-meta">
            <div>{{ branding.company_name }}</div>
            <div>
                Support:
                <a href="mailto:{{ branding.support_email }}">{{ branding.support_email }}</a>
            </div>
            {% if current_user.is_authenticated %}
                <div>Signed in as {{ current_user.email }}</div>
            {% endif %}
        </div>
    </div>
</footer>
