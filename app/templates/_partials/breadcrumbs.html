{% if breadcrumbs %}
<nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol class="breadcrumbs-list">
        {% for crumb in breadcrumbs %}
            <li class="breadcrumbs-item">
                {% if crumb.url %}
                    <a href="{{ crumb.url }}">{{ crumb.label }}</a>
                {% else %}
                    <span>{{ crumb.label }}</span>
                {% endif %}
            </li>
        {% endfor %}
    </ol>
</nav>
{% endif %}
