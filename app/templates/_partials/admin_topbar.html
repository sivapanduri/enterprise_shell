<header class="admin-topbar">

    <!-- LEFT -->
    <div class="admin-topbar-left">
        <div class="topbar-title-group">
            <span class="topbar-overline">Overview</span>
            <h1 class="topbar-title">{{ branding.app_name }}</h1>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="admin-topbar-right">

        <a class="topbar-link" href="{{ shell_links.public_home }}">
            Public
        </a>

        <div class="topbar-divider"></div>

        <div class="topbar-user">

            <div class="topbar-user-meta">
                <span class="topbar-user-name">
                    {{ current_user.display_name }}
                </span>
                <span class="topbar-user-email">
                    {{ current_user.email }}
                </span>
            </div>

            <form method="post" action="{{ shell_links.logout }}" class="inline-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-ghost btn-small">
                    Logout
                </button>
            </form>

        </div>
    </div>

</header>
